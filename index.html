<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sanjana | Ultimate ToDo App</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body{
    background:#0f172a;
    color:white;
    transition:0.3s;
}

/* NAV */
nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 60px;
    background:#111827;
}

nav h2{
    color:#38bdf8;
}

nav div{
    display:flex;
    gap:15px;
    align-items:center;
}

nav button{
    padding:6px 12px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    background:#38bdf8;
    font-weight:bold;
}

/* HERO */
.hero{
    text-align:center;
    padding:80px 20px;
}

.hero h1{
    font-size:42px;
    margin-bottom:20px;
}

.hero p{
    color:#94a3b8;
    margin-bottom:30px;
}

.hero button{
    padding:12px 25px;
    border:none;
    border-radius:8px;
    background:#22c55e;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

/* APP */
.app{
    max-width:500px;
    margin:40px auto;
    background:#1e293b;
    padding:25px;
    border-radius:15px;
    transition:0.3s;
}

input{
    width:100%;
    padding:10px;
    margin-bottom:10px;
    border-radius:8px;
    border:none;
}

.add-btn{
    background:#22c55e;
    color:white;
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

ul{
    list-style:none;
    margin-top:15px;
}

li{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#334155;
    padding:10px;
    margin-bottom:8px;
    border-radius:8px;
    transition:0.3s;
}

li:hover{
    transform:scale(1.02);
}

.completed{
    text-decoration:line-through;
    opacity:0.6;
}

.delete-btn{
    background:#ef4444;
    color:white;
    border:none;
    padding:5px 10px;
    border-radius:6px;
    cursor:pointer;
}

.counter{
    margin-top:10px;
    font-size:14px;
    color:#94a3b8;
}

/* FOOTER */
footer{
    text-align:center;
    padding:30px;
    margin-top:60px;
    color:#64748b;
}
</style>
</head>

<body>

<nav>
<h2>Sanjana.dev</h2>
<div>
<button onclick="toggleTheme()">🌙 Toggle</button>
</div>
</nav>

<section class="hero">
<h1>🚀 Ultimate To-Do App</h1>
<p>A modern productivity app built with HTML, CSS & JavaScript.</p>
<button onclick="scrollToApp()">Try the App</button>
</section>

<section class="app" id="app">
<input type="text" id="taskInput" placeholder="Enter task">
<button class="add-btn" onclick="addTask()">Add Task</button>

<ul id="taskList"></ul>

<div class="counter" id="counter">
0 Tasks
</div>
</section>

<footer>
Built with ❤️ by Sanjana | 2026
</footer>

<script>

let dark = true;

function toggleTheme(){
    const body = document.body;
    const app = document.querySelector(".app");

    if(dark){
        body.style.background = "#f1f5f9";
        body.style.color = "black";
        app.style.background = "white";
        dark = false;
    } else {
        body.style.background = "#0f172a";
        body.style.color = "white";
        app.style.background = "#1e293b";
        dark = true;
    }
}

function scrollToApp(){
    document.getElementById("app").scrollIntoView({behavior:"smooth"});
}

window.onload = function(){
    let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
    tasks.forEach(task => createTask(task.text, task.completed));
    updateCount();
}

function addTask(){
    let input=document.getElementById("taskInput");
    let task=input.value.trim();

    if(task===""){ alert("Enter task"); return; }

    createTask(task,false);
    saveTasks();
    input.value="";
}

function createTask(text,completed){
    let li=document.createElement("li");

    let span=document.createElement("span");
    span.innerText=text;

    if(completed) span.classList.add("completed");

    span.onclick=function(){
        span.classList.toggle("completed");
        saveTasks();
        updateCount();
    }

    let del=document.createElement("button");
    del.innerText="Delete";
    del.className="delete-btn";
    del.onclick=function(){
        li.remove();
        saveTasks();
        updateCount();
    }

    li.appendChild(span);
    li.appendChild(del);
    document.getElementById("taskList").appendChild(li);
    updateCount();
}

function saveTasks(){
    let tasks=[];
    document.querySelectorAll("#taskList li").forEach(li=>{
        tasks.push({
            text: li.querySelector("span").innerText,
            completed: li.querySelector("span").classList.contains("completed")
        });
    });
    localStorage.setItem("tasks",JSON.stringify(tasks));
}

function updateCount(){
    let total=document.querySelectorAll("#taskList li").length;
    let completed=document.querySelectorAll(".completed").length;
    document.getElementById("counter").innerText =
        `${completed} Completed / ${total} Total Tasks`;
}

</script>

</body>
</html>
