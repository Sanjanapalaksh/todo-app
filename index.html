<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sanjana | Ultimate ToDo App</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body{
    background:#0f172a;
    color:white;
}

/* NAV */
nav{
    display:flex;
    justify-content:space-between;
    padding:20px 60px;
    background:#111827;
}

nav h2{
    color:#38bdf8;
}

nav a{
    color:white;
    text-decoration:none;
    margin-left:20px;
}

/* HERO */
.hero{
    text-align:center;
    padding:80px 20px;
}

.hero h1{
    font-size:40px;
    margin-bottom:20px;
}

.hero p{
    color:#94a3b8;
    margin-bottom:30px;
}

.hero button{
    padding:12px 25px;
    border:none;
    border-radius:8px;
    background:#38bdf8;
    color:black;
    font-weight:bold;
    cursor:pointer;
}

/* APP CONTAINER */
.app{
    max-width:500px;
    margin:40px auto;
    background:#1e293b;
    padding:25px;
    border-radius:15px;
}

input{
    width:100%;
    padding:10px;
    margin-bottom:10px;
    border-radius:8px;
    border:none;
}

button{
    padding:8px 15px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.add-btn{
    background:#22c55e;
    color:white;
    width:100%;
}

ul{
    list-style:none;
    margin-top:15px;
}

li{
    display:flex;
    justify-content:space-between;
    background:#334155;
    padding:10px;
    margin-bottom:8px;
    border-radius:8px;
}

.completed{
    text-decoration:line-through;
    opacity:0.6;
}

.delete-btn{
    background:#ef4444;
    color:white;
}

/* FOOTER */
footer{
    text-align:center;
    padding:30px;
    margin-top:60px;
    color:#64748b;
}
</style>
</head>

<body>

<nav>
<h2>Sanjana.dev</h2>
<div>
<a href="#">Home</a>
<a href="#">GitHub</a>
</div>
</nav>

<section class="hero">
<h1>🚀 Ultimate To-Do App</h1>
<p>A modern task manager built using HTML, CSS & JavaScript.</p>
<button onclick="scrollToApp()">Try the App</button>
</section>

<section class="app" id="app">
<input type="text" id="taskInput" placeholder="Enter task">
<button class="add-btn" onclick="addTask()">Add Task</button>
<ul id="taskList"></ul>
</section>

<footer>
Built with ❤️ by Sanjana | 2026
</footer>

<script>
function scrollToApp(){
    document.getElementById("app").scrollIntoView({behavior:"smooth"});
}

function addTask(){
    let input=document.getElementById("taskInput");
    let task=input.value.trim();

    if(task===""){ alert("Enter task"); return; }

    let li=document.createElement("li");

    let span=document.createElement("span");
    span.innerText=task;
    span.onclick=function(){
        span.classList.toggle("completed");
    }

    let del=document.createElement("button");
    del.innerText="Delete";
    del.className="delete-btn";
    del.onclick=function(){
        li.remove();
    }

    li.appendChild(span);
    li.appendChild(del);
    document.getElementById("taskList").appendChild(li);

    input.value="";
}
</script>

</body>
</html>
