<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern To-Do App</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #667eea, #764ba2);
    transition: 0.3s;
}

.container {
    width: 380px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(15px);
    padding: 25px;
    border-radius: 20px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    color: white;
}

h1 {
    text-align: center;
    margin-bottom: 20px;
}

.input-section {
    display: flex;
    gap: 10px;
}

input {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: none;
    outline: none;
}

button {
    padding: 10px 14px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    transition: 0.2s;
}

.add-btn {
    background: #00c6ff;
    color: white;
}

.add-btn:hover {
    transform: scale(1.05);
}

ul {
    list-style: none;
    margin-top: 20px;
}

li {
    background: rgba(255,255,255,0.2);
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: 0.2s;
}

li:hover {
    background: rgba(255,255,255,0.3);
}

.completed {
    text-decoration: line-through;
    opacity: 0.6;
}

.delete-btn {
    background: #ff4b5c;
    color: white;
}

.bottom-section {
    display: flex;
    justify-content: space-between;
    margin-top: 15px;
    font-size: 14px;
}

#clearAll {
    background: black;
    color: white;
}

.toggle-theme {
    position: absolute;
    top: 20px;
    right: 20px;
    background: white;
    color: black;
}

/* Dark Mode */
.dark {
    background: linear-gradient(135deg, #141e30, #243b55);
}

</style>
</head>

<body>

<button class="toggle-theme" onclick="toggleTheme()">🌙</button>

<div class="container">
    <h1>✨ My Tasks</h1>

    <div class="input-section">
        <input type="text" id="taskInput" placeholder="Enter a task">
        <button class="add-btn" onclick="addTask()">Add</button>
    </div>

    <ul id="taskList"></ul>

    <div class="bottom-section">
        <p id="taskCount">Total Tasks: 0</p>
        <button id="clearAll">Clear All</button>
    </div>
</div>

<script>

document.addEventListener("DOMContentLoaded", function () {
    loadTasks();
    updateTaskCount();

    document.getElementById("clearAll").addEventListener("click", function () {
        localStorage.removeItem("tasks");
        document.getElementById("taskList").innerHTML = "";
        updateTaskCount();
    });
});

function addTask() {
    let input = document.getElementById("taskInput");
    let taskText = input.value.trim();

    if (taskText === "") {
        alert("Enter a task!");
        return;
    }

    createTaskElement(taskText, false);
    saveTask(taskText);

    input.value = "";
    updateTaskCount();
}

function createTaskElement(taskText, completed) {
    let li = document.createElement("li");

    let span = document.createElement("span");
    span.innerText = taskText;

    if (completed) span.classList.add("completed");

    span.addEventListener("click", function () {
        span.classList.toggle("completed");
        updateStorage();
    });

    let deleteBtn = document.createElement("button");
    deleteBtn.innerText = "Delete";
    deleteBtn.className = "delete-btn";

    deleteBtn.onclick = function () {
        li.remove();
        updateStorage();
        updateTaskCount();
    };

    li.appendChild(span);
    li.appendChild(deleteBtn);
    document.getElementById("taskList").appendChild(li);
}

function saveTask(taskText) {
    let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
    tasks.push({ text: taskText, completed: false });
    localStorage.setItem("tasks", JSON.stringify(tasks));
}

function loadTasks() {
    let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
    tasks.forEach(task => createTaskElement(task.text, task.completed));
}

function updateStorage() {
    let tasks = [];
    document.querySelectorAll("#taskList li").forEach(li => {
        let text = li.querySelector("span").innerText;
        let completed = li.querySelector("span").classList.contains("completed");
        tasks.push({ text, completed });
    });
    localStorage.setItem("tasks", JSON.stringify(tasks));
    updateTaskCount();
}

function updateTaskCount() {
    let total = document.querySelectorAll("#taskList li").length;
    document.getElementById("taskCount").innerText = "Total Tasks: " + total;
}

function toggleTheme() {
    document.body.classList.toggle("dark");
}

</script>

</body>
</html>
